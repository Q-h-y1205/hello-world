<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>疯狂动物城 - 欢迎来到动物乌托邦</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background: #fff;
        }
        /* 导航栏 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 180px;
            border-bottom: 1px solid #eee;
        }
        .logo {
            display: flex;
            align-items: center;
            font-size: 28px;
            font-weight: bold;
            gap: 8px;
        }
        .nav a {
            margin-left: 26px;
            text-decoration: none;
            font-size: 17px;
            color: #333;
        }
        .nav a:first-of-type {
            color: #c82423;
        }
        /* 轮播横幅 */
        .banner {
            width: 100%;
            height: 540px;
            background: #cccccc;
            position: relative;
        }
        .text-box {
            position: absolute;
            left: 140px;
            top: 200px;
            color: white;
        }
        .text-box h2 {
            font-size: 42px;
            margin-bottom: 12px;
        }
        .text-box p {
            font-size: 20px;
        }
        .left-btn, .right-btn {
            position: absolute;
            top: 50%;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(0,0,0,0.35);
            color: #fff;
            text-align: center;
            line-height: 42px;
            font-size: 20px;
            cursor: pointer;
        }
        .left-btn {
            left: 22px;
        }
        .right-btn {
            right: 22px;
        }
        .circle-dots {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
        }
        .dot {
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: #fff;
            opacity: 0.5;
        }
        .dot.active {
            opacity: 1;
        }
        /* 标题区域 */
        .title-area {
            padding: 45px 0;
            text-align: center;
            font-size: 35px;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header>
        <div class="logo">
            <span>🦊</span>
            <span>疯狂动物城</span>
        </div>
        <div class="nav">
            <a href=" ">首页</a >
            <a href="#">作品</a >
            <a href="#">角色</a >
            <a href="#">联系我们</a >
            <a href="#">登录</a >
        </div>
    </header>

    <!-- 大图轮播区域 -->
    <div class="banner">
        <div class="left-btn">&lt;</div>
        <div class="right-btn">&gt;</div>
        <div class="text-box">
            <h2>欢迎来到疯狂动物城</h2>
            <p>一个哺乳动物共存的乌托邦</p >
        </div>
        <div class="circle-dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <!-- 下方大标题 -->
    <div class="title-area">
        关于《疯狂动物城》
    </div>
</body>
</html>
