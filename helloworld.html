<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>疯狂动物城 - 欢迎来到动物乌托邦</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            width: 100%;
        }

        /* 顶部导航栏 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 200px;
            background-color: #ffffff;
            border-bottom: 1px solid #eeeeee;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 28px;
            font-weight: bold;
        }
        .nav-list {
            display: flex;
            gap: 30px;
            font-size: 18px;
        }
        .nav-list a {
            text-decoration: none;
            color: #333333;
        }
        .nav-list a.active {
            color: #dd3333;
        }

        /* 轮播横幅区域 */
        .banner {
            width: 100%;
            height: 550px;
            background-color: #cccccc;
            position: relative;
        }
        .banner-text {
            position: absolute;
            left: 150px;
            top: 220px;
            color: #ffffff;
        }
        .banner-text h2 {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .banner-text p {
            font-size: 20px;
        }
        .arrow-left, .arrow-right {
            position: absolute;
            top: 50%;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0,0,0,0.4);
            color: #fff;
            text-align: center;
            line-height: 40px;
            font-size: 20px;
            cursor: pointer;
        }
        .arrow-left {
            left: 20px;
        }
        .arrow-right {
            right: 20px;
        }
        .dots {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }
        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffffff;
            opacity: 0.5;
        }
        .dot.active {
            opacity: 1;
        }

        /* 正文标题区域 */
        .section-title {
            text-align: center;
            font-size: 36px;
            padding: 40px 0;
            background-color: #ffffff;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <header>
        <div class="logo">
            <span>🦊</span>
            <span>疯狂动物城</span>
        </div>
        <div class="nav-list">
            <a href=" " class="active">首页</a >
            <a href="#">作品</a >
            <a href="#">角色</a >
            <a href="#">联系我们</a >
            <a href="#">登录</a >
        </div>
    </header>

    <!-- 轮播大图 -->
    <div class="banner">
        <div class="arrow-left">&lt;</div>
        <div class="arrow-right">&gt;</div>
        <div class="banner-text">
            <h2>欢迎来到疯狂动物城</h2>
            <p>一个哺乳动物共存的乌托邦</p >
        </div>
        <div class="dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <!-- 板块标题 -->
    <div class="section-title">
        关于《疯狂动物城》
    </div>
</body>
</html>
